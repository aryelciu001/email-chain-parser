apiVersion: batch/v1
kind: Job
metadata:
  name: es-init-indices
  namespace: demo
spec:
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-es
          image: busybox
          command:
            - sh
            - -c
            - |
              until wget -qO- http://elasticsearch.demo.svc.cluster.local:9200/_cluster/health; do
                echo "waiting for elasticsearch..."; sleep 3;
              done
      containers:
        - name: es-init
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              curl -s -X PUT "http://elasticsearch.demo.svc.cluster.local:9200/email" \
                -H "Content-Type: application/json" \
                -d '{
                  "mappings": {
                    "properties": {
                      "id":           { "type": "keyword" },
                      "doc_id":       { "type": "keyword" },
                      "from":         { "type": "keyword" },
                      "to":           { "type": "keyword" },
                      "thread_id":    { "type": "keyword" },
                      "canon_order":  { "type": "keyword" },
                      "content":      { "type": "text" },
                      "content_hash": { "type": "keyword" }
                    }
                  }
                }'
              echo "ES indices initialized."
