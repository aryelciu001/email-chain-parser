apiVersion: apps/v1
kind: Deployment
metadata:
  name: documents-consumer
  namespace: demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: documents-consumer
  template:
    metadata:
      labels:
        app: documents-consumer
    spec:
      containers:
        - name: documents-consumer
          image: documents-consumer:local
          imagePullPolicy: Never
          env:
            - name: KAFKA_BOOTSTRAP
              value: kafka.demo.svc.cluster.local:9092
            - name: POSTGRES_DSN
              value: host=postgres.demo.svc.cluster.local dbname=emaildb user=app password=app
            - name: DATA_DIR
              value: /data/sample-data
          volumeMounts:
            - name: sample-data
              mountPath: /data/sample-data
              readOnly: true
      volumes:
        - name: sample-data
          hostPath:
            path: /data/sample-data
            type: DirectoryOrCreate
