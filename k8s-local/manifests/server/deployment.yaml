apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: server
          image: server:local
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          env:
            - name: KAFKA_BOOTSTRAP
              value: kafka.demo.svc.cluster.local:9092
            - name: DATA_DIR
              value: /data/test
          volumeMounts:
            - name: test
              mountPath: /data/test
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: test
          hostPath:
            path: /data/test
            type: DirectoryOrCreate
